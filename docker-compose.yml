services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hirevize
      POSTGRES_USER: hirevize
      POSTGRES_PASSWORD: hirevize_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
